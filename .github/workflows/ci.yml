name: CI

on:
  push:
    branches: [ "main" ]
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - 'testdata/**'
      - 'Makefile'
      - '.golangci.yml'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - 'testdata/**'
      - 'Makefile'
      - '.golangci.yml'
      - '.github/workflows/ci.yml'

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Format check
        run: make fmt && git diff --exit-code

      - name: Vet
        run: make vet

      - name: Lint
        if: matrix.os == 'ubuntu-latest'
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest

      - name: Install supply-chain tooling
        run: make tools

      - name: Build
        run: make build

      - name: Test
        run: make test

      - name: Integration test
        run: make integration-test

      - name: Fuzz seed validation
        run: make fuzz-seed
